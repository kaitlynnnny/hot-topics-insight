# Glean feeds — even distribution across 10 sources

defaults:
  llm:
    provider: openai
    model: deepseek-chat
    base_url: https://api.deepseek.com
  bootstrap: send-all

feeds:
  - name: src-aljazeera
    schedule: "every 2h"
    render: {max_items: 15}
    sources: [{type: rss, url: "https://www.aljazeera.com/xml/rss/all.xml"}]
    pipeline: [dedup, {summarize: {prompt: "Summarize this in one sentence (max 25 words)."}}]
    sinks: [{type: file, path: "./output/glean-output.jsonl", format: jsonl, required: false}]

  - name: src-guardian
    schedule: "every 2h"
    render: {max_items: 15}
    sources: [{type: rss, url: "https://www.theguardian.com/world/rss"}]
    pipeline: [dedup, {summarize: {prompt: "Summarize this in one sentence (max 25 words)."}}]
    sinks: [{type: file, path: "./output/glean-output.jsonl", format: jsonl, required: false}]

  - name: src-nytimes
    schedule: "every 2h"
    render: {max_items: 15}
    sources: [{type: rss, url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"}]
    pipeline: [dedup, {summarize: {prompt: "Summarize this in one sentence (max 25 words)."}}]
    sinks: [{type: file, path: "./output/glean-output.jsonl", format: jsonl, required: false}]

  - name: src-bbc
    schedule: "every 2h"
    render: {max_items: 15}
    sources: [{type: rss, url: "https://feeds.bbci.co.uk/news/world/rss.xml"}]
    pipeline: [dedup, {summarize: {prompt: "Summarize this in one sentence (max 25 words)."}}]
    sinks: [{type: file, path: "./output/glean-output.jsonl", format: jsonl, required: false}]

  - name: src-hackernews
    schedule: "every 2h"
    render: {max_items: 15}
    sources: [{type: hn, min_points: 30, window_hours: 8}]
    pipeline: [dedup, {summarize: {prompt: "Summarize this in one sentence (max 25 words)."}}]
    sinks: [{type: file, path: "./output/glean-output.jsonl", format: jsonl, required: false}]

